<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Uploaded Audio</title>
<style>
  body { margin: 0; font-family: Arial; background: #013220; color: white; padding: 20px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .delete-btn { color: red; font-weight: bold; cursor: pointer; font-size: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
  .card { background: #02442A; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; user-select: none; border: 3px solid transparent; }
  .card.highlighted { border-color: red; background: #500; }
  .zoom-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:200; flex-direction: column; }
  .qa-box { background: rgba(255,255,255,0.1); padding: 15px; margin-top:15px; width:80%; max-height: 40%; overflow-y: auto; display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>

<div class="top-bar">
  <h2>AUDIO</h2>
  <div class="delete-btn" id="deleteBtn">DELETE</div>
</div>

<div class="grid" id="mediaGrid"></div>

<div class="zoom-overlay" id="zoomOverlay">
  <span style="font-size:80px; margin-bottom:20px;">🔊</span>
  <audio id="zoomAudio" controls></audio>
  <button style="margin-top:20px; padding:10px 20px;" onclick="closeZoom()">CLOSE</button>
  <div class="qa-box" id="zoomQA"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
    authDomain: "tose-ccf8f.firebaseapp.com",
    databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tose-ccf8f",
    storageBucket: "tose-ccf8f.appspot.com",
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  let selectedId = null;
  let items = {};

  onValue(ref(db, "quizMedia/audio"), (snapshot) => {
    const grid = document.getElementById('mediaGrid');
    grid.innerHTML = '';
    items = snapshot.val() || {};
    for (let key in items) {
      const item = items[key];
      const div = document.createElement('div');
      div.className = 'card';
      div.id = key;
      div.innerHTML = `<div>🔊</div><p>${item.name}</p>`;
      
      let pressTimer;
      div.addEventListener('mousedown', () => { pressTimer = setTimeout(() => toggleHighlight(key), 800); });
      div.addEventListener('mouseup', () => { clearTimeout(pressTimer); });
      div.addEventListener('touchstart', () => { pressTimer = setTimeout(() => toggleHighlight(key), 800); });
      div.addEventListener('touchend', () => { clearTimeout(pressTimer); });
      
      div.onclick = () => {
        if(div.classList.contains('highlighted')) return;
        showZoom(item);
      };
      grid.appendChild(div);
    }
  });

  function toggleHighlight(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('highlighted'));
    selectedId = (selectedId === id) ? null : id;
    if(selectedId) document.getElementById(id).classList.add('highlighted');
  }

  function showZoom(item) {
    const audioEl = document.getElementById('zoomAudio');
    audioEl.src = item.data;
    audioEl.play();
    const qaBox = document.getElementById('zoomQA');
    qaBox.innerHTML = '';
    item.questions.forEach((q, idx) => {
      if(q || item.answers[idx]) {
        qaBox.innerHTML += `<div><b>Q${idx+1}:</b> ${q}</div><div><b>A${idx+1}:</b> ${item.answers[idx]}</div>`;
      }
    });
    document.getElementById('zoomOverlay').style.display = 'flex';
  }

  window.closeZoom = function() {
    document.getElementById('zoomAudio').pause();
    document.getElementById('zoomOverlay').style.display = 'none';
  };

  document.getElementById('deleteBtn').onclick = async () => {
    if(selectedId) {
      await remove(ref(db, "quizMedia/audio/" + selectedId));
      selectedId = null;
      alert("Deleted successfully");
    }
  };
</script>
</body>
</html>
