<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quizer Maker - Dashboard</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #0b2913; /* Dark Green */
    color: #e0f2e5;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  /* Top Navigation */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: rgba(0, 0, 0, 0.2);
  }
  nav a {
    color: #a3e6b3; /* Light Green */
    text-decoration: none;
    font-weight: bold;
    font-size: 1.5rem;
    transition: 0.2s;
  }
  nav a:hover {
    color: #ffffff;
  }
  /* Big Plus Sign Centered */
  .center-plus {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 15rem;
    color: white;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s;
  }
  .center-plus:hover {
    transform: translate(-50%, -50%) scale(1.1);
  }
  /* Modal Background Overlay */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  /* Media Type Selector Boxes */
  .type-selector-container {
    display: flex;
    gap: 30px;
  }
  .type-box {
    background: #4a4a4a; /* Grey Pop up Box */
    color: white;
    width: 150px;
    height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.2rem;
    transition: 0.2s;
  }
  .type-box:hover {
    transform: scale(1.05);
    background: #5a5a5a;
  }
  .type-box span {
    font-size: 3rem;
    margin-top: 10px;
  }
  /* Data Input Panel */
  .data-panel {
    background: #133a1c;
    width: 85%;
    max-width: 900px;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 12px;
    padding: 20px;
    display: none;
    border: 2px solid #a3e6b3;
  }
  .stretched-tile {
    background: #1c5228;
    padding: 12px;
    text-align: center;
    font-weight: bold;
    font-size: 1.3rem;
    border-radius: 6px;
    margin-bottom: 15px;
    color: white;
  }
  .grid-3-col {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
    padding: 10px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
  }
  .field-group label {
    font-size: 0.85rem;
    margin-bottom: 4px;
    color: #a3e6b3;
  }
  .field-group input {
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #fff;
    color: #000;
  }
  .submit-btn {
    background: #3a86ff; /* Light Blue */
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 1.4rem;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    margin-top: 10px;
  }
  .submit-btn:hover {
    background: #4ea8ff;
  }
</style>
</head>
<body>

  <nav>
    <a href="images.html">IMAGES</a>
    <a href="audio.html">AUDIO</a>
    <a href="video.html">VIDEO</a>
  </nav>

  <div class="center-plus" id="openModalBtn">+</div>

  <div class="modal-overlay" id="modalOverlay">
    
    <div class="type-selector-container" id="typeSelector">
      <div class="type-box" data-type="audio">
        Audio
        <span>🔊</span>
      </div>
      <div class="type-box" data-type="images">
        Images
        <span>🖼</span>
      </div>
      <div class="type-box" data-type="video">
        Video
        <span>📸</span>
      </div>
    </div>

    <div class="data-panel" id="dataPanel">
      <div class="stretched-tile" id="fileDetailTile">Selected File: None</div>
      
      <div class="stretched-tile">QUESTIONS</div>
      <div class="grid-3-col" id="questionsGrid"></div>

      <div class="stretched-tile">ANSWERS</div>
      <div class="grid-3-col" id="answersGrid"></div>

      <div class="submit-btn" id="submitBtn">SUBMIT</div>
    </div>

  </div>

  <input type="file" id="hiddenFileInput" style="display: none;">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
    authDomain: "tose-ccf8f.firebaseapp.com",
    databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tose-ccf8f",
    storageBucket: "tose-ccf8f.appspot.com",
    messagingSenderId: "475447495901",
    appId: "1:475447495901:web:9189276a162a3680afdf34"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let selectedType = "";
  let targetFile = null;

  const modalOverlay = document.getElementById("modalOverlay");
  const typeSelector = document.getElementById("typeSelector");
  const dataPanel = document.getElementById("dataPanel");
  const hiddenFileInput = document.getElementById("hiddenFileInput");
  const fileDetailTile = document.getElementById("fileDetailTile");

  // Dynamically generate inputs for 1-10
  const qGrid = document.getElementById("questionsGrid");
  const aGrid = document.getElementById("answersGrid");
  for(let i=1; i<=10; i++){
    qGrid.innerHTML += `<div class="field-group"><label>Question ${i}</label><input type="text" id="q_${i}" required></div>`;
    aGrid.innerHTML += `<div class="field-group"><label>Answer ${i}</label><input type="text" id="a_${i}" required></div>`;
  }

  // Open Modal
  document.getElementById("openModalBtn").onclick = () => {
    modalOverlay.style.display = "flex";
    typeSelector.style.display = "flex";
    dataPanel.style.display = "none";
  };

  // Close overlay on direct background click
  modalOverlay.onclick = (e) => {
    if(e.target === modalOverlay) modalOverlay.style.display = "none";
  };

  // Select item type triggers device picker
  document.querySelectorAll(".type-box").forEach(box => {
    box.onclick = () => {
      selectedType = box.getAttribute("data-type");
      if(selectedType === "audio") hiddenFileInput.accept = "audio/*";
      if(selectedType === "images") hiddenFileInput.accept = "image/*";
      if(selectedType === "video") hiddenFileInput.accept = "video/*";
      hiddenFileInput.click();
    };
  });

  // Handle local file chosen
  hiddenFileInput.onchange = (e) => {
    if(e.target.files.length > 0) {
      targetFile = e.target.files[0];
      fileDetailTile.innerText = `File: ${targetFile.name} (${(targetFile.size/1024/1024).toFixed(2)} MB)`;
      typeSelector.style.display = "none";
      dataPanel.style.display = "block";
    }
  };

  // Submit Processing
  document.getElementById("submitBtn").onclick = async () => {
    if(!targetFile) return;
    
    // Package Q/A Arrays
    let questions = {};
    let answers = {};
    for(let i=1; i<=10; i++){
      questions[`q${i}`] = document.getElementById(`q_${i}`).value || "";
      answers[`a${i}`] = document.getElementById(`a_${i}`).value || "";
    }

    document.getElementById("submitBtn").innerText = "UPLOADING...";
    
    try {
      // 1. Upload media asset to storage
      const storagePath = `${selectedType}/${Date.now()}_${targetFile.name}`;
      const fileRef = sRef(storage, storagePath);
      const snapshot = await uploadBytes(fileRef, targetFile);
      const downloadURL = await getDownloadURL(snapshot.ref);

      // 2. Write structural entry to Realtime Database
      const dbRef = ref(db, `quizes/${selectedType}`);
      const newQuizRef = push(dbRef);
      await set(newQuizRef, {
        fileName: targetFile.name,
        fileUrl: downloadURL,
        questions: questions,
        answers: answers
      });

      alert("Data Saved Successfully!");
      location.reload();
    } catch (err) {
      console.error(err);
      alert("Error saving database elements.");
      document.getElementById("submitBtn").innerText = "SUBMIT";
    }
  };
</script>
</body>
</html>
